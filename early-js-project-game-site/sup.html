    <script src="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.7.3/js/uikit.min.js"></script>

    <script>
      'use strict';
      const buttons = document.querySelectorAll('#buy');
      const cartElement = document.getElementById('cart');
      let cartCounter = localStorage.getItem('cartCounter') || 0;
      cartElement.innerHTML = 'Корзина (' + cartCounter + ')';
      let cost = 0;
  
      const cartItemsElement = document.getElementById('cartItems');
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
  
      function displayCartItems() {
        cartItemsElement.innerHTML = '';
        cart.forEach(item => {
          const itemElement = document.createElement('div');
          itemElement.classList.add('itms')
          itemElement.textContent = `Товар: ${item.item}, Цена: ${item.price}`;
          cost+=parseInt(item.price);
          cartItemsElement.appendChild(itemElement);
        });
      }
  
      displayCartItems();
      finalcost.innerHTML = "Итог : " + cost;
      buttons.forEach(button => {
        button.addEventListener('click', function() {
          cartCounter++;
          localStorage.setItem('cartCounter', cartCounter);
          cartElement.innerHTML = 'Корзина (' + cartCounter + ')';
        });
      });
  
      function addToCart(item, price) {
        cart.push({ item, price });
        localStorage.setItem('cart', JSON.stringify(cart));
        console.log('Товар добавлен в корзину');
        displayCartItems();
      }
      
      let socket = new WebSocket('ws://studyprograms.informatics.ru:8080')
    socket.addEventListener('open',function(){
      alert('Соединение установлено')
    });
    socket.addEventListener('close',function(){
      alert('Соединение закрыто')
    });
    socket.addEventListener('message',function(message){
      const res = JSON.parse(message.data);
      
      const messageBox = document.getElementById('messageBox');
      const newMessage = `
        <div class="message">
          <div class="head">
            <span class="author">${res.author}</span>
            <span class="time">${new Date().getHours()}:${new Date().getMinutes()}</span>
          </div>
          <p class="content">
            ${res.text}
          </p>
        </div>
        `
      messageBox.innerHTML += newMessage;
    });
    sendBtn.addEventListener('click',function(){
      socket.send(messageText.value);
    })

    // === Подготовка необходимых глобальных переменных ===
		let deg = 0;
    let canvas = document.querySelector('#game');
    let ctx = canvas.getContext('2d');
    var earthImg = new Image();
    earthImg.src = "https://studyprograms.informatics.ru/api/game/earth.png";
    
    
    
    // =============================================================================================================
    // === ЗАДАНИЕ 1. ПОДГРУЖАЕМ HP (СКОЛЬКО ЖИЗНЕЙ ОСТАЛОСЬ И ЗЕМЛИ) ==============================================
    // =============================================================================================================
    
    /* === Получение HP (кол-ва жизней) === */
    // Создаем интервал, который стучится на адрес https://studyprograms.informatics.ru/api/game/gethp.php
    // каждые 100мс (10 раз в секунду) асинхронно.
    // В ответе от сервера приходит число (не JSON!). Записываем его в innerHTML элемента span,
    // специально подготовленного для этого в HTML-коде
    
    
    
    // =============================================================================================================
    // === ЗАДАНИЕ 2. ПОДГРУЖАЕМ И ОТРИСОВЫВАЕМ МАССИВ МЕТЕОРИТОВ ==================================================
    // =============================================================================================================
    
    /* === Получение координат метеоритов и их отрисовка === */
    function updState(){
      let xhr = new XMLHttpRequest();
      xhr.open('GET','https://studyprograms.informatics.ru/api/game/getstate.php');
      xhr.send();

      xhr.addEventListener('readystatechange',function(){
        if(xhr.status == 200 && xhr.readyState == xhr.DONE){
          let info = JSON.parse(xhr.responseText)
          hp.innerHTML = info.hp;
          let meteors = info.meteorits;

          ctx.clearRect(0, 0, 1000, 500);

          // Рисуем Землю
          drawEarth();

          // Обходим массив метеоритов
          for(let i =0;i<meteors.length;i++){
            drawMeteorit(meteors[i].x,meteors[i].y)
          }
        }
      });
    }
        
     

    let interval = setInterval(updState,100);
    
    
    
    
    // =============================================================================================================
    // === ЗАДАНИЕ 3. РЕАЛИЗУЕМ ВЫСТРЕЛ (ЗАПРОС С КООРДИНАТАМИ ПРИ КЛИКЕ НА CANVAS) ================================
    // =============================================================================================================

    /* === Выстрел == */
    canvas.addEventListener('click', function(e) {
      // Координаты клика (ИСПОЛЬЗУЙТЕ ИХ КАК КООРДИНАТЫ ВЫСТРЕЛА)
      let clickX = Math.round(e.clientX - game.getBoundingClientRect().left);
      let clickY = Math.round(e.clientY - game.getBoundingClientRect().top);


      // Отправляем асинхронный GET-запрос на адрес https://studyprograms.informatics.ru/api/game/shot.php 
      // С параметрами x = clickX и у = clickY
    });




    
    
    
    
    // =============================================================================================================
    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =================================================================================
    // =============================================================================================================
    
    /* === Функция рисования вращающейся Земли на canvas === */
    function drawEarth() {
      ctx.save();
      ctx.translate(500, 250);
      ctx.rotate((deg % 360) * Math.PI / 180);
      ctx.drawImage(earthImg, -25, -25, 50, 50);
      ctx.restore();
      deg += 10;
    }

    /* === Функция рисования метеорита в точке (x,y) на canvas === */
    function drawMeteorit(x, y) {
      // Рисуем обводку (свечение)
      ctx.fillStyle = '#555d85';
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      
      // Рисуем ядро (центральная ярко белая часть)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    </script>
  </body>
