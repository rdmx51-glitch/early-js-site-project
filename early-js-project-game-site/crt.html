<!DOCTYPE html>
<html>
<head>
  <title>Магазин игр</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.7.3/css/uikit.min.css" />
  <style>
    body {
      background-color: #121212; 
      color: #ffffff; 
    }
    
    header, footer {
      background-color: #FFA500; 
      color: #000; 
    }

    a {
      color: #FFA500; 
    }

    a:hover {
      color: #FFD700; 
    }

    main {
      margin-top: 20px;
    }

    .logo-img {
      max-width: 150px; 
    }

    .about, .new-arrivals, .popular-games {
      margin-bottom: 40px;
    }
    
    .game-card {
      background: #333; 
      padding: 20px;
      border: 1px solid #444; 
      border-radius: 5px;
      text-align: center;
    }

    .game-card img {
      max-width: 100%;
      height: auto;
    }

    .game-card h3 {
      margin-top: 15px;
      margin-bottom: 10px;
      color: #FFA500; 
    }
    .game-card h4 {
      margin-top: 15px;
      margin-bottom: 10px;
      color: #856731; 
    }
    .game-card p {
      color: #ccc; 
    }
    .gameImg {
      height: 200px;
      width: 200px;
    }
    .itms{
        width: 100%;
        height: 50px;
        margin: 20px;
        border: white solid 2px;
    }
    
  </style>
</head>
<body>
    <header class="uk-container">
      <nav class="uk-navbar-container uk-margin" uk-navbar>
        <div class="uk-navbar-left">
          <img src="img/cheese_logo.png" alt="Логотип" class="logo-img">
          <a class="uk-navbar-item uk-logo" href="#">CheeZy Games</a>
        </div>
        <div class="uk-navbar-right">
          <ul class="uk-navbar-nav">
            <li><a href="/index.html">Главная</a></li>
            <li><a href="/lbr.html">Каталог</a></li>

            <li><a href="/crt.html" id="cart">Корзина (0)</a></li>
          </ul>
        </div>
      </nav>
    </header>
  
    <main class="uk-container">
      <div id="cartItems"></div>
      <h2 id="finalcost"> Итог : 0</h2>
      <button id="pay" class="uk-button uk-button-default"><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Оплатить</a></button>
      <button id="clearcart" class="uk-button uk-button-default">Очистить корзину</button>
    </main>
  
    <footer class="uk-container uk-margin-large-top">
      <p>© 2024 CheeZy Games. Все права защищены.</p>
    </footer>
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.7.3/js/uikit.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uikit/3.7.3/js/uikit-icons.min.js"></script> 
    <script src="js/handlebars-v4.1.2.js"></script>
  
    <script>
      'use strict';
      const buttons = document.querySelectorAll('#buy');
      const cartElement = document.getElementById('cart');
      let cartCounter = localStorage.getItem('cartCounter') || 0;
      cartElement.innerHTML = 'Корзина (' + cartCounter + ')';
      let cost = 0;
  
      const cartItemsElement = document.getElementById('cartItems');
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
  
      function displayCartItems() {
        cartItemsElement.innerHTML = '';
        cart.forEach(item => {
          const itemElement = document.createElement('div');
          itemElement.classList.add('itms')
          itemElement.textContent = `Товар: ${item.item}, Цена: ${item.price}`;
          cost+=parseInt(item.price);
          cartItemsElement.appendChild(itemElement);
        });
      }
  
      displayCartItems();
      finalcost.innerHTML = "Итог : " + cost;
      buttons.forEach(button => {
        button.addEventListener('click', function() {
          cartCounter++;
          localStorage.setItem('cartCounter', cartCounter);
          cartElement.innerHTML = 'Корзина (' + cartCounter + ')';
        });
      });
  
      function addToCart(item, price) {
        cart.push({ item, price });
        localStorage.setItem('cart', JSON.stringify(cart));
        console.log('Товар добавлен в корзину');
        displayCartItems();
      }
      clearcart.addEventListener('click',function(){
        cartItemsElement.innerHTML = '';
        localStorage.clear();
        cartElement.innerHTML = 'Корзина (0)';
        finalcost.innerHTML = "Итог : 0";
      })
    </script>
  </body>
  </html>
